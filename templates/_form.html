<label for="company">Company *</label>
<input
    type="text"
    id="company"
    name="company"
    placeholder="e.g. Google"
    value="{{ application['company'] if application else '' }}"
>

<label for="role">Role *</label>
<input
    type="text"
    id="role"
    name="role"
    placeholder="e.g. Software Engineering Intern"
    value="{{ application['role'] if application else '' }}"
>

<label for="status">Status *</label>
<select id="status" name="status">
    <option value="">Select status</option>
    <option value="Applied" {% if application and application["status"] == "Applied" %}selected{% endif %}>Applied</option>
    <option value="Interview" {% if application and application["status"] == "Interview" %}selected{% endif %}>Interview</option>
    <option value="Rejected" {% if application and application["status"] == "Rejected" %}selected{% endif %}>Rejected</option>
    <option value="Offer" {% if application and application["status"] == "Offer" %}selected{% endif %}>Offer</option>
    <option value="Closed" {% if application and application["status"] == "Closed" %}selected{% endif %}>Closed</option>
</select>

<label for="deadline">Deadline *</label>
<input
    type="date"
    id="deadline"
    name="deadline"
    value="{{ application['deadline'] if application else '' }}"
>

<label for="application_link">Application Link</label>
<input
    type="url"
    id="application_link"
    name="application_link"
    placeholder="https://..."
    value="{{ application['application_link'] if application else '' }}"
>

<label for="notes">Notes</label>
<textarea
    id="notes"
    name="notes"
    rows="5"
    placeholder="Add any useful notes here..."
>{{ application['notes'] if application else '' }}</textarea>
