{% extends "base.html" %}

{% block content %}
    <section class="page-header">
        <h2>Add New Application</h2>
        <p>Save the details of a placement or internship opportunity.</p>
    </section>

    <form class="form-card" method="POST">
        {% include "_form.html" %}

        <div class="form-actions">
            <button type="submit" class="button">Save Application</button>
            <a class="button button-secondary" href="{{ url_for('index') }}">Back</a>
        </div>
    </form>
{% endblock %}
